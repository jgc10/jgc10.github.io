baseURL: 'https://cyber-cit.club/'
languageCode: 'en-us'
title: 'cyber@CIT'

theme: 'terminal'
timeZone: "America/New_York"
menus:
  main:
    - identifier: about
      name: About
      url: /about.html
      weight: 20
    - identifier: team
      name: Team
      url: /team.html
      weight: 30
    - identifier: resources
      name: Resources
      url: /resources.html
      weight: 40
    - identifier: blog
      name: Blog
      url: /blog
      weight: 100
#    - identifier: tags
#      name: Tags
#      url: /tags
#      weight: 40
paginate: 10
permalinks:
  blog: "/blog/:year/:month/:day/:title/"
taxonomies:
  tag: "tags"
  author: "authors"
indexes:
  tag: "tags"
markup:
  defaultMarkdownHandler: "goldmark"
  goldmark:
    # Enable or disable smartypants (automatic conversion of ASCII punctuation to smart punctuation)
    smartypants: true
    # Enable or disable fractions (automatic conversion of fractions)
    fractions: true
    # Enable or disable superscript and subscript support
    # (enable to allow ^ and ~ for superscript and subscript)
    superscript: true
    unsafe: true
# ignoreFiles:
#   - "themes/terminal/content"
# outputs:
#   blog:
#     - HTML
#     - RSS
#     - sitemap-blog.xml
#   home:
#     - HTML
#     - RSS
#     - sitemap.xml
params:
  social:
    - name: discord
      url: https://discord.gg/Au9bQBen
    - name: github
      url: https://github.com/cyber-cit
#    - name: x
#      url: https://x.com/myusername
#    - name: youtube
#      url: https://youtube.com/myusername
#    - name: linkedin
#      url: https://linkedin.com/in/myusername
#    - name: "buy me a coffee"
#      url: https://www.buymeacoffee.com/myusername
#  disqus: "mydisquscode"
  description: "Cybersecurity Club from the University of New Haven"

module:
  hugoVersion:
    extended: false
    min: "0.116.0"
